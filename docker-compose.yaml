services:
  postgres:
    image: "postgres:18-alpine"
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db-data:/var/lib/postgresql
      - db-logs:/var/log/postgresql

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: always
    environment:
      - KAFKA_NODE_ID
      - KAFKA_CLUSTER_ID
      - KAFKA_PROCESS_ROLES
      - KAFKA_CONTROLLER_QUORUM_VOTERS
      - KAFKA_CONTROLLER_LISTENER_NAMES
      - KAFKA_LISTENERS
      - KAFKA_ADVERTISED_LISTENERS
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
      - KAFKA_INTER_BROKER_LISTENER_NAME
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE
      - KAFKA_NUM_PARTITIONS
    ports:
      - "9092:9092"
      - "9094:9094"
    volumes:
      - ./docker/kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    environment:
      - KAFKA_CLUSTERS_0_NAME
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
      - DYNAMIC_CONFIG_ENABLED
    ports:
      - "8070:8080"
    depends_on:
      - kafka

  influxdb:
    image: influxdb:2.8
    container_name: influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE
      - DOCKER_INFLUXDB_INIT_USERNAME
      - DOCKER_INFLUXDB_INIT_PASSWORD
      - DOCKER_INFLUXDB_INIT_ORG
      - DOCKER_INFLUXDB_INIT_BUCKET
      - DOCKER_INFLUXDB_INIT_RETENTION
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
    ports:
      - "8072:8086"
    volumes:
      - ./influxdb_data:/var/lib/influxdb2

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  user-service:
    build:
      context: .
      dockerfile: ./user-service/src/main/docker/Dockerfile
    container_name: user-service
    environment:
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - SPRING_JPA_HIBERNATE_DDL_AUTO
    volumes:
      - ./logs/:/logs
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  device-service:
    build:
      context: .
      dockerfile: ./device-service/src/main/docker/Dockerfile
    container_name: device-service
    environment:
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - SPRING_JPA_HIBERNATE_DDL_AUTO
    volumes:
      - ./logs/:/logs
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  ingestion-service:
    build:
      context: .
      dockerfile: ./ingestion-service/src/main/docker/Dockerfile
    container_name: ingestion_service
    environment:
      - KAFKA_SERVER
      - KAFKA_EXTERNAL_PORT
    volumes:
      - ./logs/:/logs
    ports:
      - "8082:8082"
    depends_on:
      - kafka

  usage-service:
    build:
      context: .
      dockerfile: ./usage-service/src/main/docker/Dockerfile
    container_name: usage_service
    environment:
      - KAFKA_SERVER
      - KAFKA_EXTERNAL_PORT
      - INFLUX_HOST
      - INFLUXDB_TOKEN
      - INFLUXDB_ORG
      - INFLUXDB_BUCKET
      - DEVICE_SERVICE_URL
      - USER_SERVICE_URL
    volumes:
      - ./logs/:/logs
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - influxdb
      - user-service
      - device-service

  alert-service:
    build:
      context: .
      dockerfile: ./alert-service/src/main/docker/Dockerfile
    container_name: alert_service
    environment:
      - KAFKA_SERVER
      - KAFKA_EXTERNAL_PORT
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - SPRING_JPA_HIBERNATE_DDL_AUTO
      - MAIL_HOST
      - MAIL_PORT
      - USER_SERVICE_URL
    volumes:
      - ./logs/:/logs
    ports:
      - "8084:8084"
    depends_on:
      - kafka
      - postgres
      - mailpit
      - user-service

  insight-service:
    build:
      context: .
      dockerfile: ./insight-service/src/main/docker/Dockerfile
    container_name: insight_service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - USAGE_SERVICE_URL
      - OLLAMA_URL
    volumes:
      - ./logs/:/logs
    ports:
      - "8085:8085"
    depends_on:
      - usage-service

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/src/main/docker/Dockerfile
    container_name: api-gateway
    environment:
      - USER_SERVICE_URL
      - DEVICE_SERVICE_URL
      - INGESTION_SERVICE_URL
      - INSIGHT_SERVICE_URL
    volumes:
      - ./logs/:/logs
    ports:
      - "9000:9000"



volumes:
  db-data:
  db-logs:
  kafka-data:
