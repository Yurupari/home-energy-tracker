services:
  postgres:
    image: "postgres:18-alpine"
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db-data:/var/lib/postgresql
      - db-logs:/var/log/postgresql

  user-service:
    build:
      context: .
      dockerfile: ./user-service/src/main/docker/Dockerfile
    container_name: user-service
    environment:
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - SPRING_JPA_HIBERNATE_DDL_AUTO
    volumes:
      - ./logs/:/logs
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  device-service:
    build:
      context: .
      dockerfile: ./device-service/src/main/docker/Dockerfile
    container_name: device-service
    environment:
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - SPRING_JPA_HIBERNATE_DDL_AUTO
    volumes:
      - ./logs/:/logs
    ports:
      - "8081:8081"
    depends_on:
      - postgres

volumes:
  db-data:
  db-logs:
