server:
  port: 9000

spring:
  application:
    name: api-gateway

services:
  items:
    user-service:
      url: ${USER_SERVICE_URL}
      path: /api/v1/user/**
      circuitBreakerId: userServiceCircuitBreaker
      fallbackPath: /fallback/user
      fallbackMessage: User service is down
    device-service:
      url: ${DEVICE_SERVICE_URL}
      path: /api/v1/device/**
      circuitBreakerId: deviceServiceCircuitBreaker
      fallbackPath: /fallback/device
      fallbackMessage: Device service is down
    ingestion-service:
      url: ${INGESTION_SERVICE_URL}
      path: /api/v1/ingestion/**
      circuitBreakerId: ingestionServiceCircuitBreaker
      fallbackPath: /fallback/ingestion
      fallbackMessage: Ingestion service is down
    insight-service:
      url: ${INSIGHT_SERVICE_URL}
      path: /api/v1/insight/**
      circuitBreakerId: insightServiceCircuitBreaker
      fallbackPath: /fallback/insight
      fallbackMessage: Insight service is down

management:
  health:
    circuitbreakers:
      enabled: true
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 8
        failureRateThreshold: 20
        minimum-number-of-calls: 4
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
