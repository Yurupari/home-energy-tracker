server:
  port: 8082

spring:
  application:
    name: ingestion-service

  kafka:
    bootstrap-servers: ${KAFKA_SERVER}:${KAFKA_EXTERNAL_PORT}
    template:
      default-topic: energy-usage
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: energyUsageEvent:com.yurupari.common_data.kafka.event.EnergyUsageEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

documentation:
  contact:
    url: https://github.com/yurupari
  license:
    name: Creative Commons Attribution-NonCommercial 4.0 International License
    url: https://creativecommons.org/licenses/by-nc/4.0/
  title: Ingestion Service API
  description: Ingestion Service API for Home Energy Tracker Project
  version: @version@
